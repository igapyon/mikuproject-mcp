name: Release package tarball

on:
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      tag_name:
        description: "GitHub Release tag to attach the package tarball to"
        required: true
        type: string

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  release-package:
    runs-on: ubuntu-latest
    if: startsWith(github.event.release.tag_name || github.event.inputs.tag_name, 'v')

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag_name || github.event.release.tag_name || github.ref }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Test
        run: npm run test

      - name: Pack Node package
        run: |
          mkdir -p release-assets
          npm --workspace packages/node pack --pack-destination release-assets

      - name: Verify packed MCP surface
        run: node packages/node/scripts/verify-package-surface.mjs release-assets/*.tgz

      - name: Upload package tarball to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag_name || github.event.release.tag_name || github.ref_name }}
          files: release-assets/*.tgz
          draft: false
          prerelease: false
